name: Mirror to GitLab

on:
  push:
    branches: ["**"]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN_FOR_MIRRORING }}@gitlab.com/info.codigoprisma-group/prisma-toolkit.git
          git push gitlab --all --force
          git push gitlab --tags --force